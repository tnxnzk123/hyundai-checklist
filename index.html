<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현대자동차 해외연수 26년도 — 체크리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #222632;
      --surface-3: #2a2f3e;
      --border: #2e3446;
      --border-hover: #4a5068;
      --text: #e8eaed;
      --text-muted: #9aa0b0;
      --text-dim: #6b7280;
      --accent: #4f8cff;
      --accent-soft: rgba(79,140,255,0.12);
      --red: #ff6b6b;
      --red-soft: rgba(255,107,107,0.12);
      --orange: #ffa94d;
      --orange-soft: rgba(255,169,77,0.12);
      --green: #51cf66;
      --green-soft: rgba(81,207,102,0.12);
      --yellow: #ffd43b;
      --yellow-soft: rgba(255,212,59,0.12);
      --purple: #b197fc;
      --purple-soft: rgba(177,151,252,0.12);
      --cyan: #66d9e8;
      --cyan-soft: rgba(102,217,232,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px 20px 100px; }

    /* 헤더 */
    .header {
      text-align: center; margin-bottom: 24px; padding: 40px 28px 32px;
      background: linear-gradient(135deg, #1a2744 0%, #1a1d27 50%, #2a1a2e 100%);
      border-radius: 20px; border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(79,140,255,0.06) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(177,151,252,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .header h1 { font-size: 26px; font-weight: 800; position: relative; }
    .header .sub { font-size: 13px; color: var(--text-muted); margin-top: 10px; position: relative; }
    .header .live-badge {
      display: inline-block; padding: 4px 12px; background: var(--red-soft);
      color: var(--red); border-radius: 20px; font-size: 12px; font-weight: 600;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    /* 툴바 */
    .toolbar { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar button {
      padding: 8px 16px; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); border-radius: var(--radius-sm); font-size: 13px;
      font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
    .toolbar button:disabled { opacity: .35; cursor: not-allowed; }
    .toolbar button:disabled:hover { border-color: var(--border); color: var(--text-muted); }
    .toolbar .undo-group { display: flex; gap: 4px; margin-right: auto; }
    .toolbar .undo-group button { padding: 8px 12px; font-size: 15px; line-height: 1; }
    .undo-count { font-size: 11px; color: var(--text-dim); padding: 0 4px; display: flex; align-items: center; }

    /* 안내 배너 */
    .guide-banner {
      display: flex; align-items: center; gap: 10px; padding: 14px 20px;
      background: var(--accent-soft); border: 1px solid rgba(79,140,255,0.2);
      border-radius: var(--radius); margin-bottom: 20px; font-size: 13px; color: var(--accent);
    }
    .guide-banner .icon { font-size: 18px; flex-shrink: 0; }

    /* 범례 */
    .legend {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
      padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 12px; color: var(--text-muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* Part 그룹 헤더 */
    .part-group { margin-bottom: 40px; }
    .part-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
      padding: 16px 20px; border-radius: 14px; border: 1px solid var(--border);
    }
    .part-header.p1 { background: linear-gradient(135deg, rgba(255,169,77,0.08), transparent 70%); border-color: rgba(255,169,77,0.2); }
    .part-header.p2 { background: linear-gradient(135deg, rgba(102,217,232,0.08), transparent 70%); border-color: rgba(102,217,232,0.2); }
    .part-header.p3 { background: linear-gradient(135deg, rgba(79,140,255,0.08), transparent 70%); border-color: rgba(79,140,255,0.2); }
    .part-header.p4 { background: linear-gradient(135deg, rgba(177,151,252,0.08), transparent 70%); border-color: rgba(177,151,252,0.2); }
    .part-header.req { background: linear-gradient(135deg, rgba(255,107,107,0.08), transparent 70%); border-color: rgba(255,107,107,0.2); }
    .part-label {
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 800;
      letter-spacing: .5px; white-space: nowrap;
    }
    .part-label.p1 { background: var(--orange-soft); color: var(--orange); }
    .part-label.p2 { background: var(--cyan-soft); color: var(--cyan); }
    .part-label.p3 { background: var(--accent-soft); color: var(--accent); }
    .part-label.p4 { background: var(--purple-soft); color: var(--purple); }
    .part-label.req { background: var(--red-soft); color: var(--red); }
    .part-name { font-size: 20px; font-weight: 800; flex: 1; }

    /* 섹션 (하위파트) */
    .section { margin-bottom: 24px; margin-left: 12px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .section-title-input {
      flex: 1; font-size: 16px; font-weight: 700; color: var(--text);
      background: transparent; border: 1px solid transparent; border-radius: 6px;
      padding: 4px 8px; font-family: inherit; outline: none; transition: all .15s;
    }
    .section-title-input:hover { border-color: var(--border); }
    .section-title-input:focus { border-color: var(--accent); background: var(--surface-2); }
    .section-count {
      font-size: 12px; color: var(--text-dim); background: var(--surface-2);
      padding: 4px 10px; border-radius: 12px; white-space: nowrap;
    }
    .section-delete-btn {
      opacity: 0; background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 4px;
      transition: all .15s; flex-shrink: 0;
    }
    .section-header:hover .section-delete-btn { opacity: 1; }
    .section-delete-btn:hover { color: var(--red); background: var(--red-soft); }

    .add-btn, .add-section-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 12px; margin-top: 8px; border: 2px dashed var(--border);
      background: transparent; color: var(--text-dim); border-radius: var(--radius);
      font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .add-btn:hover, .add-section-btn:hover { border-color: var(--accent); color: var(--accent); }
    .add-section-btn { margin-left: 12px; margin-top: 12px; border-style: dashed; }

    /* 카드 항목 */
    .item-list { min-height: 20px; }
    .item {
      display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px;
      margin-bottom: 6px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); transition: border-color .15s, box-shadow .15s, opacity .15s;
      cursor: default; position: relative;
    }
    .item:hover { border-color: var(--border-hover); }
    .item.dragging { opacity: .4; }

    .drag-handle {
      cursor: grab; color: var(--text-dim); font-size: 16px; padding: 2px 4px;
      flex-shrink: 0; user-select: none; line-height: 1; margin-top: 2px; transition: color .15s;
    }
    .drag-handle:hover { color: var(--text-muted); }
    .drag-handle:active { cursor: grabbing; }

    .status-btn {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
      background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px;
      transition: all .15s; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent;
    }
    .status-btn[data-status="done"] { background: var(--green); border-color: var(--green); color: #fff; }
    .status-btn[data-status="progress"] { background: var(--yellow-soft); border-color: var(--yellow); color: var(--yellow); }
    .status-btn[data-status="draft"] { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); }

    .item-content { flex: 1; min-width: 0; }
    .item-title, .item-detail {
      border: none; background: transparent; width: 100%; outline: none;
      font-family: inherit; line-height: 1.5; padding: 0; resize: none;
    }
    .item-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .item-detail { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .item-title:focus, .item-detail:focus {
      background: var(--surface-2); border-radius: 4px; padding: 2px 6px; margin-left: -6px; margin-right: -6px;
    }
    .item-title::placeholder, .item-detail::placeholder { color: var(--text-dim); }

    .status-label {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
      margin-top: 6px; display: inline-block; cursor: pointer; user-select: none;
    }
    .status-label[data-status="todo"] { background: var(--red-soft); color: var(--red); }
    .status-label[data-status="progress"] { background: var(--yellow-soft); color: var(--yellow); }
    .status-label[data-status="draft"] { background: var(--orange-soft); color: var(--orange); }
    .status-label[data-status="done"] { background: var(--green-soft); color: var(--green); }
    .item[data-status="done"] .item-title { color: var(--text-dim); text-decoration: line-through; }

    .month-select {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 4px; padding: 2px 6px; font-size: 11px; margin-left: 6px; outline: none; cursor: pointer;
      font-family: inherit; font-weight: 600;
    }
    .month-select:focus, .month-select:hover { border-color: var(--accent); color: var(--accent); }

    .delete-btn {
      opacity: 0; background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px;
      transition: all .15s; flex-shrink: 0; margin-top: 1px;
    }
    .item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); background: var(--red-soft); }

    /* 타임라인 */
    .timeline { position: relative; padding-left: 28px; margin-top: 12px; }
    .timeline::before {
      content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, var(--red), var(--orange), var(--cyan), var(--accent), var(--green)); border-radius: 2px;
    }
    .tl-item {
      position: relative; margin-bottom: 20px; padding: 14px 18px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .tl-item::before {
      content: ''; position: absolute; left: -24px; top: 18px;
      width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg);
    }
    .tl-item.current::before { background: var(--red); border-color: var(--red); box-shadow: 0 0 8px rgba(255,107,107,.4); }
    .tl-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .tl-item .current-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      background: var(--red-soft); color: var(--red); margin-left: 6px; animation: pulse 2s ease-in-out infinite;
    }
    .tl-item ul { list-style: none; }
    .tl-item li { padding: 4px 0; font-size: 13px; color: var(--text-muted); }
    .tl-item li::before { content: '\2192'; margin-right: 8px; color: var(--text-dim); }

    /* 토스트/모달 */
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface-2);
      border: 1px solid var(--border); color: var(--text); padding: 12px 20px;
      border-radius: var(--radius); font-size: 13px; z-index: 1000;
      opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal textarea {
      width: 100%; min-height: 200px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: 'Consolas', monospace;
      font-size: 12px; padding: 12px; resize: vertical; outline: none;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button {
      padding: 8px 20px; border-radius: var(--radius-sm); font-size: 13px;
      font-family: inherit; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-muted); transition: all .15s;
    }
    .modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

    @media (max-width: 768px) {
      .container { padding: 16px 12px 80px; }
      .header { padding: 28px 16px 24px; }
      .header h1 { font-size: 20px; }
      .toolbar { justify-content: center; }
      .toolbar .undo-group { margin-right: 0; width: 100%; justify-content: center; }
      .section { margin-left: 0; }
      .add-section-btn { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚗 현대자동차 직원 해외연수 26년도</h1>
      <div class="sub">
        <span class="live-badge">● 사전교육(8.7) 준비 진행 중</span>
        <br><span id="lastSaved" style="font-size:13px; font-weight:500; opacity:.9; display:inline-block; margin-top:8px;"></span>
      </div>
    </div>

    <div class="toolbar">
      <div class="undo-group">
        <button id="undoBtn" onclick="undo()" disabled title="되돌리기 (Ctrl+Z)">↩</button>
        <button id="redoBtn" onclick="redo()" disabled title="다시 실행 (Ctrl+Y)">↪</button>
        <span class="undo-count" id="undoCount"></span>
      </div>
      <button onclick="syncFromCloud()" style="color:var(--accent);">🔄 최신 동기화</button>
      <button onclick="exportData()">📤 내보내기</button>
      <button onclick="showImportModal()">📥 불러오기</button>
      <button onclick="resetData()" style="color:var(--red);">🗑️ 초기화</button>
    </div>

    <div class="guide-banner">
      <span class="icon">☁️</span>
      <span>
        <strong>구글 시트 클라우드 연동</strong> · 하위파트 이름 클릭 → 수정 · 항목별 <strong>[월]</strong> 지정 → 타임라인 자동 연동
      </span>
    </div>

    <div class="legend">
      <span style="color:var(--text-dim);">상태:</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--red);"></span> 미완료</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--yellow);"></span> 진행 중</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--orange);"></span> 초안/검토</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green);"></span> 완료</span>
    </div>

    <div id="sections"></div>

    <!-- 타임라인 -->
    <div style="margin-top:48px;">
      <div class="part-header p3">
        <span class="part-label p3">일정</span>
        <span class="part-name">📅 자동 타임라인 (월별)</span>
      </div>
      <div class="timeline" id="timelineContainer"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <h3>📥 데이터 불러오기</h3>
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">내보내기한 JSON을 붙여넣고 "적용"을 누르세요.</p>
      <textarea id="importText" placeholder="JSON 데이터를 여기에 붙여넣기..."></textarea>
      <div class="modal-actions">
        <button onclick="hideImportModal()">취소</button>
        <button class="primary" onclick="importData()">적용</button>
      </div>
    </div>
  </div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3S2IVKw3CNZJ_ZUW8NrOIXZcljN8U3iaEl8KlhmgoWIJamt-ESyCY2Hq4XEcNM4kVCA/exec';

// Part 정의
const PARTS = [
  { id:'p1', label:'Part 1', name:'사전답사', icon:'🔍' },
  { id:'p2', label:'Part 2', name:'사전교육', icon:'📖' },
  { id:'p3', label:'Part 3', name:'본교육', icon:'✈️' },
  { id:'p4', label:'Part 4', name:'사후콘텐츠', icon:'🔮' },
  { id:'req', label:'요청', name:'현대차 확인·요청 사항', icon:'🎯' },
];

const MONTHS = ['6월','7월','8월','9월','10월','미분류'];

const DEFAULT_DATA = { sections: [
  // ── Part 1: 사전답사 ──
  { id:'survey-field', part:'p1', title:'현장 확인 사항', items:[
    {id:'a1', month:'6월', title:'연수 코스 적합성 현장 확인', detail:'튀르키예·독일 동선 이동 시간, 도보 난이도, 버스 정차 가능 여부', status:'todo'},
    {id:'a2', month:'6월', title:'구글맵 형태 검증', detail:'1안·2안 중 현장에서 적합한 형태 판단', status:'todo'},
    {id:'a3', month:'6월', title:'구글맵 내 패들렛 접속·업로드 테스트', detail:'현지 인터넷 환경에서 패들렛 정상 작동 여부', status:'todo'},
    {id:'a4', month:'6월', title:'미션 수행 장소 확인', detail:'각 미션(①~⑤)별 실제 수행 가능 여부, 적합 장소 선정', status:'todo'},
    {id:'a5', month:'6월', title:'미션별 소요 시간 확인', detail:'미션 안내→수행→패들렛 업로드까지 현실적 소요 시간', status:'todo'},
    {id:'a6', month:'6월', title:'가이드 멘트·교육 메시지 현장 연결 확인', detail:'실제 연수지에서 멘트가 자연스럽게 전달될 수 있는지', status:'todo'},
    {id:'a7', month:'6월', title:'연수지별 방문 필요/불필요 판단', detail:'"인터넷 자료로 충분 vs 현장 촬영 필수" 판단 기록', status:'todo'},
    {id:'a8', month:'6월', title:'연수지 사진 촬영', detail:'정보 카드·안내 영상·엽서 제작용 고해상도 사진 확보', status:'todo'},
    {id:'a9', month:'6월', title:'독일 도시 확정 관련 현장 정보 수집', detail:'뮌헨(BMW·테슬라) vs 슈투트가르트 비교', status:'todo'},
    {id:'a10', month:'6월', title:'포드 방문 가능 여부 현장 확인', detail:'추가 제안된 포드 방문지 실현 가능성', status:'todo'},
  ]},

const STATUS_CYCLE = ['todo','progress','draft','done'];
const STATUS_LABELS = {todo:'미완료', progress:'진행 중', draft:'초안/검토', done:'완료'};
const STATUS_ICONS = {todo:'', progress:'◔', draft:'✎', done:'✓'};
const STORAGE_KEY = 'hyundai_checklist_v4';
const HISTORY_KEY = 'hyundai_checklist_history_v4';
const MAX_HISTORY = 80;

let data;
let history = [];
let future = [];
let textEditSnapshot = null;
let isSyncing = false;

// ===== 데이터 마이그레이션 =====
function migrateData(d) {
  if (!d || !d.sections) return d;
  d.sections.forEach(sec => {
    // month 없는 항목은 '미분류'
    sec.items.forEach(i => i.month = i.month || '미분류');
    // 구버전 badgeClass → part 마이그레이션
    if (!sec.part) {
      if (sec.badgeClass === 'p1') sec.part = 'p1';
      else if (sec.badgeClass === 'p2') sec.part = 'p3'; // 기존 p2는 본교육이었음
      else if (sec.badgeClass === 'p3') sec.part = 'p4';
      else if (sec.badgeClass === 'req') sec.part = 'req';
      else sec.part = 'p3'; // 기본값
    }
  });
  return d;
}

// ===== 초기화 =====
async function init() {
  showToast('☁️ 클라우드에서 데이터를 불러오는 중...');
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const cloudData = await res.json();
    if (cloudData && cloudData.sections && cloudData.sections.length > 0) {
      data = migrateData(cloudData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showToast('☁️ 구글 시트와 동기화 완료!');
    } else {
      loadLocalOrDefault();
      saveAction();
    }
  } catch (err) {
    showToast('⚠️ 오프라인 모드');
    loadLocalOrDefault();
  }
  loadHistory(); render();
  setTimestamp('☁️ 방금 전 클라우드와 동기화됨');
  updateUndoUI();
}

function loadLocalOrDefault() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { data = migrateData(JSON.parse(saved)); } catch { data = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  } else {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

// ===== 클라우드 동기화 =====
async function syncFromCloud() {
  if (isSyncing) return;
  isSyncing = true; document.body.style.cursor = 'wait';
  showToast('🔄 최신 데이터를 가져옵니다...');
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const cloudData = await res.json();
    if (cloudData && cloudData.sections && cloudData.sections.length > 0) {
      data = migrateData(cloudData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render(); setTimestamp('☁️ 방금 전 클라우드와 동기화됨');
      showToast('✅ 동기화 완료!');
    }
  } catch { showToast('⚠️ 동기화 실패'); }
  finally { isSyncing = false; document.body.style.cursor = 'default'; }
}

// ===== 저장 =====
let syncTimer = null;
function saveAction() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  document.getElementById('lastSaved').textContent = '⏳ 클라우드에 저장하는 중...';
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      await fetch(GAS_URL, { method:'POST', body:JSON.stringify(data), headers:{'Content-Type':'text/plain;charset=utf-8'} });
      const n = new Date();
      setTimestamp(`☁️ ${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} 저장 완료`);
    } catch { setTimestamp('⚠️ 클라우드 저장 실패 (로컬에만 저장됨)'); }
  }, 1500);
}
function setTimestamp(msg) { document.getElementById('lastSaved').innerHTML = msg; }

// ===== 히스토리 =====
function snapshot() { return JSON.stringify(data); }
function pushHistory(label) {
  const snap = snapshot();
  if (history.length > 0 && history[history.length-1].snap === snap) return;
  history.push({ snap, label });
  if (history.length > MAX_HISTORY) history.shift();
  future = []; updateUndoUI(); saveHistory();
}
function undo() {
  if (!history.length) return;
  future.push({ snap: snapshot() });
  data = JSON.parse(history.pop().snap);
  saveAction(); render(); updateUndoUI(); saveHistory();
  showToast('↩ 되돌리기 완료');
}
function redo() {
  if (!future.length) return;
  history.push({ snap: snapshot() });
  data = JSON.parse(future.pop().snap);
  saveAction(); render(); updateUndoUI(); saveHistory();
  showToast('↪ 다시 실행 완료');
}
function updateUndoUI() {
  document.getElementById('undoBtn').disabled = !history.length;
  document.getElementById('redoBtn').disabled = !future.length;
  document.getElementById('undoCount').textContent = history.length ? `되돌리기 ${history.length}회` : '';
}
function saveHistory() { try { localStorage.setItem(HISTORY_KEY, JSON.stringify({ history:history.slice(-30), future:future.slice(-10) })); } catch {} }
function loadHistory() { try { const s = localStorage.getItem(HISTORY_KEY); if(s){const p=JSON.parse(s); history=p.history||[]; future=p.future||[];} } catch { history=[]; future=[]; } }

document.addEventListener('keydown', e => {
  if (!(e.ctrlKey||e.metaKey)) return;
  if (e.key==='z'&&!e.shiftKey) { e.preventDefault(); undo(); }
  else if (e.key==='y'||(e.key==='z'&&e.shiftKey)) { e.preventDefault(); redo(); }
});

// ===== 렌더링 =====
function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let allItems = [];

  PARTS.forEach(part => {
    const partSections = data.sections.filter(s => s.part === part.id);
    if (partSections.length === 0 && part.id !== 'req') {
      // Part에 섹션이 하나도 없어도 헤더와 추가 버튼은 보여줌
    }

    // Part 그룹 컨테이너
    const group = document.createElement('div');
    group.className = 'part-group';

    // Part 헤더
    const header = document.createElement('div');
    header.className = `part-header ${part.id}`;
    header.innerHTML = `
      <span class="part-label ${part.id}">${part.label}</span>
      <span class="part-name">${part.icon} ${part.name}</span>
    `;
    group.appendChild(header);

    // 각 섹션(하위파트) 렌더링
    partSections.forEach(sec => {
      const si = data.sections.indexOf(sec);
      const secDiv = document.createElement('div');
      secDiv.className = 'section';

      const doneCount = sec.items.filter(i => i.status === 'done').length;

      // 섹션 헤더 (편집 가능)
      const secHeader = document.createElement('div');
      secHeader.className = 'section-header';
      secHeader.innerHTML = `
        <input class="section-title-input" type="text" value="${esc(sec.title)}" placeholder="하위파트 이름 입력">
        <span class="section-count">${doneCount}/${sec.items.length}</span>
        <button class="section-delete-btn" title="이 하위파트 삭제">✕</button>
      `;

      // 섹션 타이틀 편집
      const titleInput = secHeader.querySelector('.section-title-input');
      let titleSnap = null;
      titleInput.addEventListener('focus', () => { titleSnap = snapshot(); });
      titleInput.addEventListener('blur', () => {
        if (sec.title !== titleInput.value) {
          if (titleSnap) { history.push({snap:titleSnap}); if(history.length>MAX_HISTORY)history.shift(); future=[]; updateUndoUI(); saveHistory(); }
          sec.title = titleInput.value;
          saveAction();
        }
        titleSnap = null;
      });
      titleInput.addEventListener('keydown', e => { if(e.key==='Enter') titleInput.blur(); });

      // 섹션 삭제
      secHeader.querySelector('.section-delete-btn').addEventListener('click', () => {
        if (sec.items.length > 0) {
          if (!confirm(`"${sec.title}" 하위파트와 포함된 ${sec.items.length}개 항목이 모두 삭제됩니다.\n계속하시겠습니까?`)) return;
        }
        pushHistory('하위파트 삭제');
        data.sections.splice(si, 1);
        saveAction(); render();
        showToast('하위파트가 삭제되었습니다');
      });

      secDiv.appendChild(secHeader);

      // 항목 리스트
      const list = document.createElement('div');
      list.className = 'item-list';
      list.dataset.section = si;
      sec.items.forEach(item => {
        allItems.push(item);
        list.appendChild(createItemEl(item, si));
      });
      secDiv.appendChild(list);

      // 항목 추가 버튼
      const addBtn = document.createElement('button');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+ 항목 추가';
      addBtn.addEventListener('click', () => addItem(si));
      secDiv.appendChild(addBtn);

      // 드래그 앤 드롭
      list.addEventListener('dragover', e => {
        e.preventDefault();
        const afterEl = getDragAfterElement(list, e.clientY);
        const draggingEl = document.querySelector('.dragging');
        if (!draggingEl) return;
        if (afterEl) list.insertBefore(draggingEl, afterEl);
        else list.appendChild(draggingEl);
      });
      list.addEventListener('drop', e => { e.preventDefault(); reorderFromDOM(si, list); });

      group.appendChild(secDiv);
    });

    // 하위파트 추가 버튼
    const addSecBtn = document.createElement('button');
    addSecBtn.className = 'add-section-btn';
    addSecBtn.textContent = '+ 하위파트 추가';
    addSecBtn.addEventListener('click', () => addSection(part.id));
    group.appendChild(addSecBtn);

    container.appendChild(group);
  });

  renderTimeline(allItems);
}

function createItemEl(item, si) {
  const el = document.createElement('div');
  el.className = 'item'; el.draggable = true;
  el.dataset.id = item.id; el.dataset.status = item.status;

  const monthOpts = MONTHS.map(m => `<option value="${m}" ${item.month===m?'selected':''}>${m}</option>`).join('');

  el.innerHTML = `
    <span class="drag-handle" title="드래그하여 순서 변경">⠿</span>
    <button class="status-btn" data-status="${item.status}" title="상태 변경">${STATUS_ICONS[item.status]}</button>
    <div class="item-content">
      <textarea class="item-title" rows="1" placeholder="항목명 입력">${esc(item.title)}</textarea>
      <textarea class="item-detail" rows="1" placeholder="세부 내용 (선택)">${esc(item.detail)}</textarea>
      <div>
        <span class="status-label" data-status="${item.status}">${STATUS_LABELS[item.status]}</span>
        <select class="month-select" title="목표 일정">${monthOpts}</select>
      </div>
    </div>
    <button class="delete-btn" title="삭제">&times;</button>
  `;

  // 월 선택
  el.querySelector('.month-select').addEventListener('change', e => {
    pushHistory('일정(월) 변경'); item.month = e.target.value; saveAction(); render();
  });

  // 드래그
  el.addEventListener('dragstart', () => { pushHistory('순서 변경'); el.classList.add('dragging'); });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    const list = el.closest('.item-list');
    if (list) reorderFromDOM(parseInt(list.dataset.section), list);
  });

  // 상태 변경
  const cycleStatus = () => {
    pushHistory('상태 변경');
    item.status = STATUS_CYCLE[(STATUS_CYCLE.indexOf(item.status)+1) % STATUS_CYCLE.length];
    saveAction(); render();
  };
  el.querySelector('.status-btn').addEventListener('click', cycleStatus);
  el.querySelector('.status-label').addEventListener('click', cycleStatus);

  // 텍스트 편집
  const titleEl = el.querySelector('.item-title');
  const detailEl = el.querySelector('.item-detail');
  autoResize(titleEl); autoResize(detailEl);

  let snap = null;
  function onFocus() { snap = snapshot(); }
  function onBlur() {
    item.title = titleEl.value; item.detail = detailEl.value;
    if (snap && snap !== snapshot()) {
      history.push({snap}); if(history.length>MAX_HISTORY)history.shift();
      future=[]; updateUndoUI(); saveHistory(); saveAction(); render();
    }
    snap = null;
  }
  titleEl.addEventListener('focus', onFocus); titleEl.addEventListener('blur', onBlur);
  titleEl.addEventListener('input', () => { item.title=titleEl.value; autoResize(titleEl); saveAction(); });
  detailEl.addEventListener('focus', onFocus); detailEl.addEventListener('blur', onBlur);
  detailEl.addEventListener('input', () => { item.detail=detailEl.value; autoResize(detailEl); saveAction(); });

  // 삭제
  el.querySelector('.delete-btn').addEventListener('click', () => {
    if (confirm(`"${item.title}" 항목을 삭제하시겠습니까?`)) {
      pushHistory('항목 삭제');
      const sec = data.sections[si];
      sec.items.splice(sec.items.indexOf(item), 1);
      saveAction(); render();
    }
  });

  return el;
}

function autoResize(el) { requestAnimationFrame(() => { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }); }

// ===== 하위파트 추가 =====
function addSection(partId) {
  pushHistory('하위파트 추가');
  // 해당 Part의 마지막 섹션 뒤에 삽입
  let insertIdx = -1;
  for (let i = data.sections.length - 1; i >= 0; i--) {
    if (data.sections[i].part === partId) { insertIdx = i + 1; break; }
  }
  if (insertIdx === -1) insertIdx = data.sections.length;

  const newSec = {
    id: 'sec_' + Date.now(),
    part: partId,
    title: '새 하위파트',
    items: []
  };
  data.sections.splice(insertIdx, 0, newSec);
  saveAction(); render();
  showToast('하위파트가 추가되었습니다');

  // 새로 생긴 타이틀에 포커스
  setTimeout(() => {
    const inputs = document.querySelectorAll('.section-title-input');
    for (const inp of inputs) {
      if (inp.value === '새 하위파트') { inp.focus(); inp.select(); break; }
    }
  }, 100);
}

// ===== 항목 추가 =====
function addItem(si) {
  pushHistory('항목 추가');
  data.sections[si].items.push({ id:'item_'+Date.now(), month:'미분류', title:'', detail:'', status:'todo' });
  saveAction(); render();
  setTimeout(() => {
    const lists = document.querySelectorAll('.item-list');
    const last = lists[si]?.querySelector('.item:last-child .item-title');
    if (last) last.focus();
  }, 50);
}

// ===== 드래그 =====
function getDragAfterElement(container, y) {
  const els = [...container.querySelectorAll('.item:not(.dragging)')];
  return els.reduce((c, child) => {
    const box = child.getBoundingClientRect();
    const off = y - box.top - box.height/2;
    return off < 0 && off > c.offset ? { offset:off, element:child } : c;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
function reorderFromDOM(si, listEl) {
  const ids = [...listEl.querySelectorAll('.item')].map(el => el.dataset.id);
  const sec = data.sections[si];
  const reordered = ids.map(id => sec.items.find(i => i.id === id)).filter(Boolean);
  if (reordered.length === sec.items.length) { sec.items = reordered; saveAction(); }
}

// ===== 타임라인 =====
function renderTimeline(allItems) {
  const container = document.getElementById('timelineContainer');
  container.innerHTML = '';
  const grouped = {}; MONTHS.forEach(m => grouped[m] = []);
  allItems.forEach(item => { const m = item.month||'미분류'; if(!grouped[m])grouped[m]=[]; grouped[m].push(item); });
  const curMonth = (new Date().getMonth()+1)+'월';

  MONTHS.forEach(m => {
    if (!grouped[m].length) return;
    const isCur = m === curMonth;
    const div = document.createElement('div');
    div.className = 'tl-item' + (isCur?' current':'');
    let html = '<ul>';
    grouped[m].forEach(item => {
      const done = item.status === 'done';
      html += `<li style="${done?'text-decoration:line-through;opacity:.5':''}">` +
              `${done?'✅ ':'🔸 '}${esc(item.title)}</li>`;
    });
    html += '</ul>';
    div.innerHTML = `<h4>${m} ${isCur?'<span class="current-tag">● 이번 달</span>':''}</h4>${html}`;
    container.appendChild(div);
  });
}

// ===== 유틸 =====
function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`현대차_체크리스트_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('JSON 내보내기 완료');
}
function showImportModal() { document.getElementById('importModal').classList.add('show'); document.getElementById('importText').value=''; }
function hideImportModal() { document.getElementById('importModal').classList.remove('show'); }
function importData() {
  const text = document.getElementById('importText').value.trim();
  if (!text) return;
  try {
    const parsed = JSON.parse(text);
    if (!parsed.sections) throw new Error('형식 오류');
    pushHistory('불러오기 전');
    data = migrateData(parsed);
    saveAction(); render(); hideImportModal(); showToast('데이터 적용 완료!');
  } catch(e) { alert('JSON 오류: '+e.message); }
}
function resetData() {
  if (confirm('모든 데이터를 초기화하시겠습니까?\n되돌리기(Ctrl+Z)로 복구할 수 있습니다.')) {
    pushHistory('초기화 전');
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveAction(); render(); showToast('초기화 완료');
  }
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
document.getElementById('importModal').addEventListener('click', e => { if(e.target===e.currentTarget) hideImportModal(); });

init();
</script>
